<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Defang Tool</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #1a1d26;
    --border: #252830;
    --accent: #00f5a0;
    --accent2: #00c3ff;
    --danger: #ff4f6d;
    --text: #e2e8f0;
    --muted: #6b7280;
    --nav-h: 56px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* NAV */
  nav {
    height: var(--nav-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 32px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
    margin-right: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-brand span { color: var(--muted); }

  .nav-tabs {
    display: flex;
    gap: 4px;
    height: 100%;
    align-items: flex-end;
  }

  .nav-tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    background: transparent;
    position: relative;
    bottom: -1px;
  }

  .nav-tab:hover { color: var(--text); border-color: var(--border); background: var(--surface2); }

  .nav-tab.active {
    color: var(--accent);
    border-color: var(--border);
    border-bottom-color: var(--surface);
    background: var(--surface);
  }

  .nav-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
  }

  /* MAIN */
  main {
    flex: 1;
    padding: 28px 24px;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
  }

  .page { display: none; animation: fadeIn 0.25s ease; }
  .page.active { display: block; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  /* PAGE HEADER */
  .page-header {
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .page-badge {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .badge-defang { background: rgba(0,245,160,0.12); color: var(--accent); border: 1px solid rgba(0,245,160,0.3); }
  .badge-refang  { background: rgba(255,79,109,0.12); color: var(--danger);  border: 1px solid rgba(255,79,109,0.3); }

  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .label-input::before  { background: var(--accent2); }
  .label-output::before { background: var(--accent); }

  /* TEXTAREA */
  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    padding: 14px;
    resize: vertical;
    min-height: 130px;
    transition: border-color 0.2s;
    outline: none;
  }

  textarea:focus { border-color: var(--accent2); }

  textarea.output-area {
    min-height: 130px;
    color: var(--accent);
    cursor: default;
  }

  textarea.output-area:focus { border-color: var(--accent); }

  /* OPTIONS */
  .options-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }

  .opt-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    width: 100%;
    margin-bottom: 4px;
  }

  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 8px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: all 0.15s;
    user-select: none;
    font-size: 12px;
  }

  .checkbox-item:hover { border-color: var(--accent2); }

  .checkbox-item input[type="checkbox"] { display: none; }

  .check-box {
    width: 14px; height: 14px;
    border: 1.5px solid var(--muted);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .checkbox-item input:checked ~ .check-box {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-box::after {
    content: '';
    width: 4px; height: 7px;
    border: 1.5px solid var(--bg);
    border-top: none; border-left: none;
    transform: rotate(45deg) translateY(-1px);
    opacity: 0;
    transition: opacity 0.1s;
  }

  .checkbox-item input:checked ~ .check-box::after { opacity: 1; }

  .check-text { color: var(--text); }
  .check-hint { color: var(--muted); font-size: 10px; margin-left: 2px; }

  /* BUTTONS ROW */
  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-danger {
    background: rgba(255,79,109,0.15);
    color: var(--danger);
    border-color: rgba(255,79,109,0.4);
  }
  .btn-danger:hover { background: rgba(255,79,109,0.25); transform: translateY(-1px); }

  .btn-ghost {
    background: var(--surface2);
    color: var(--muted);
    border-color: var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent2); transform: translateY(-1px); }

  .btn-copy {
    background: var(--surface2);
    color: var(--accent2);
    border-color: rgba(0,195,255,0.3);
    margin-left: auto;
  }
  .btn-copy:hover { background: rgba(0,195,255,0.1); transform: translateY(-1px); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 6px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    z-index: 9998;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* line count badge */
  .line-count {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    text-align: right;
  }

  /* divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 8px 0;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content:''; flex:1; height:1px; background: var(--border);
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="1" y="4" width="14" height="8" rx="2" stroke="currentColor" stroke-width="1.4"/>
      <path d="M5 8h6M8 5v6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    URL<span>//</span>TOOL
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage('defang')">⬛ Defang</button>
    <button class="nav-tab" onclick="switchPage('refang')">🔓 Refang</button>
  </div>
</nav>

<main>

  <!-- DEFANG PAGE -->
  <div class="page active" id="page-defang">
    <div class="page-header">
      <span class="page-badge badge-defang">Defang</span>
      <span class="page-title">Make URLs Safe to Share</span>
    </div>

    <div class="card">
      <div class="card-label label-input">Input — paste URLs (one per line)</div>
      <textarea id="defang-input" placeholder="https://example.com&#10;http://malicious-site.org/path?q=1&#10;192.168.1.1" spellcheck="false" oninput="updateCount('defang-input','defang-count')"></textarea>
      <div class="line-count" id="defang-count">0 lines</div>
    </div>

    <div class="card">
      <div class="opt-label">Defang Options</div>
      <div class="options-grid">
        <label class="checkbox-item">
          <input type="checkbox" id="d-https" checked>
          <span class="check-box"></span>
          <span class="check-text">https / http</span>
          <span class="check-hint">→ hxxps / hxxp</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="d-slashes" checked>
          <span class="check-box"></span>
          <span class="check-text">://</span>
          <span class="check-hint">→ [://]</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="d-dot" checked>
          <span class="check-box"></span>
          <span class="check-text">Dots</span>
          <span class="check-hint">. → [.]</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="d-at">
          <span class="check-box"></span>
          <span class="check-text">@ symbol</span>
          <span class="check-hint">@ → [@]</span>
        </label>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="runDefang()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5h9M6.5 2l4.5 4.5-4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Defang
        </button>
        <button class="btn btn-ghost" onclick="clearAll('defang-input','defang-output','defang-count')">Clear</button>
        <button class="btn btn-ghost" onclick="selectAll('d-https','d-slashes','d-dot','d-at')">Select All</button>
        <button class="btn btn-ghost" onclick="clearChecks('d-https','d-slashes','d-dot','d-at')">None</button>
      </div>
    </div>

    <div class="divider">output</div>

    <div class="card">
      <div class="card-label label-output">Output — defanged URLs</div>
      <textarea id="defang-output" class="output-area" readonly placeholder="Defanged output will appear here..." spellcheck="false"></textarea>
      <div class="btn-row" style="margin-top:12px;">
        <button class="btn btn-copy" onclick="copyOutput('defang-output')">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="4" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 4V2.5A1.5 1.5 0 015.5 1H9.5A1.5 1.5 0 0111 2.5V6.5A1.5 1.5 0 019.5 8H8" stroke="currentColor" stroke-width="1.3"/></svg>
          Copy Output
        </button>
      </div>
    </div>
  </div>

  <!-- REFANG PAGE -->
  <div class="page" id="page-refang">
    <div class="page-header">
      <span class="page-badge badge-refang">Refang</span>
      <span class="page-title">Restore URLs to Original Form</span>
    </div>

    <div class="card">
      <div class="card-label label-input">Input — paste defanged URLs (one per line)</div>
      <textarea id="refang-input" placeholder="hxxps[://]example[.]com&#10;hxxp[://]malicious-site[.]org/path" spellcheck="false" oninput="updateCount('refang-input','refang-count')"></textarea>
      <div class="line-count" id="refang-count">0 lines</div>
    </div>

    <div class="card">
      <div class="opt-label">Refang Options</div>
      <div class="options-grid">
        <label class="checkbox-item">
          <input type="checkbox" id="r-https" checked>
          <span class="check-box"></span>
          <span class="check-text">hxxps / hxxp</span>
          <span class="check-hint">→ https / http</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="r-slashes" checked>
          <span class="check-box"></span>
          <span class="check-text">[://]</span>
          <span class="check-hint">→ ://</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="r-dot" checked>
          <span class="check-box"></span>
          <span class="check-text">[.] dots</span>
          <span class="check-hint">→ .</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="r-at">
          <span class="check-box"></span>
          <span class="check-text">[@] symbol</span>
          <span class="check-hint">→ @</span>
        </label>
      </div>

      <div class="btn-row">
        <button class="btn btn-danger" onclick="runRefang()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M11 6.5H2M6.5 11L2 6.5 6.5 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Refang
        </button>
        <button class="btn btn-ghost" onclick="clearAll('refang-input','refang-output','refang-count')">Clear</button>
        <button class="btn btn-ghost" onclick="selectAll('r-https','r-slashes','r-dot','r-at')">Select All</button>
        <button class="btn btn-ghost" onclick="clearChecks('r-https','r-slashes','r-dot','r-at')">None</button>
      </div>
    </div>

    <div class="divider">output</div>

    <div class="card">
      <div class="card-label label-output">Output — refanged URLs</div>
      <textarea id="refang-output" class="output-area" readonly placeholder="Refanged output will appear here..." spellcheck="false"></textarea>
      <div class="btn-row" style="margin-top:12px;">
        <button class="btn btn-copy" onclick="copyOutput('refang-output')">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="4" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 4V2.5A1.5 1.5 0 015.5 1H9.5A1.5 1.5 0 0111 2.5V6.5A1.5 1.5 0 019.5 8H8" stroke="currentColor" stroke-width="1.3"/></svg>
          Copy Output
        </button>
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
  function switchPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  function updateCount(inputId, countId) {
    const val = document.getElementById(inputId).value;
    const lines = val ? val.split('\n').filter(l => l.trim()).length : 0;
    document.getElementById(countId).textContent = lines + ' line' + (lines !== 1 ? 's' : '');
  }

  function clearAll(inputId, outputId, countId) {
    document.getElementById(inputId).value = '';
    document.getElementById(outputId).value = '';
    document.getElementById(countId).textContent = '0 lines';
  }

  function selectAll(...ids) { ids.forEach(id => document.getElementById(id).checked = true); }
  function clearChecks(...ids) { ids.forEach(id => document.getElementById(id).checked = false); }

  function runDefang() {
    const input = document.getElementById('defang-input').value;
    const doHttps   = document.getElementById('d-https').checked;
    const doSlashes = document.getElementById('d-slashes').checked;
    const doDot     = document.getElementById('d-dot').checked;
    const doAt      = document.getElementById('d-at').checked;

    const lines = input.split('\n');
    const out = lines.map(line => {
      let l = line;
      if (doHttps)   l = l.replace(/\bhttps\b/gi, 'hxxps').replace(/\bhttp\b/gi, 'hxxp');
      if (doSlashes) l = l.replace(/:\/\//g, '[://]');
      if (doDot)     l = l.replace(/\./g, '[.]');
      if (doAt)      l = l.replace(/@/g, '[@]');
      return l;
    });

    document.getElementById('defang-output').value = out.join('\n');
  }

  function runRefang() {
    const input = document.getElementById('refang-input').value;
    const doHttps   = document.getElementById('r-https').checked;
    const doSlashes = document.getElementById('r-slashes').checked;
    const doDot     = document.getElementById('r-dot').checked;
    const doAt      = document.getElementById('r-at').checked;

    const lines = input.split('\n');
    const out = lines.map(line => {
      let l = line;
      if (doHttps)   l = l.replace(/hxxps/gi, 'https').replace(/hxxp/gi, 'http');
      if (doSlashes) l = l.replace(/\[:\/\/\]/g, '://');
      if (doDot)     l = l.replace(/\[\.\]/g, '.');
      if (doAt)      l = l.replace(/\[@\]/g, '@');
      return l;
    });

    document.getElementById('refang-output').value = out.join('\n');
  }

  function copyOutput(id) {
    const val = document.getElementById(id).value;
    if (!val) return;
    navigator.clipboard.writeText(val).then(() => showToast());
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }
</script>
</body>
</html>
